_subdirectory: "template/{{ template_type }}"

# Message to show after generating or regenerating the project successfully
_message_after_copy: |

  Your project "{{ github_repo }}" has been created successfully!  See
  the template's guide as well as the "TODO.md" file in the newly created
  project for more details on the next steps.

# Questions
for_seedcase:
  type: bool
  help: "Is this (new or existing) website part of the Seedcase Project?"
  default: false

template_type:
  type: str
  help: "Which website template do you want to use?"
  choices:
    - simple
    - complete
  default: complete
  when: "{{ not for_seedcase }}"

website_format:
  type: str
  help: "What style of Quarto website do you want?"
  choices:
    - website
    - book
  default: website

github_user:
  type: str
  help: |
    What is the name of the GitHub user or organization where the
    template repository will be or is stored?
  default: >-
    {{ "seedcase-project" if for_seedcase else "" }}

github_repo:
  type: str
  help: |
    What is the name of the GitHub repository where the template will be or
    is stored? We strongly recommend using the default given.
  default: "{{ _folder_name }}"

hosting_provider:
  type: str
  help: "What website hosting provider will you use for the template?"
  choices:
    - netlify
    - gh-pages
  default: >-
    {{ "netlify" if for_seedcase else "gh-pages" }}

# Configurations not asked
github_repo_spec:
  type: str
  default: "{{ github_user }}/{{ github_repo }}"
  when: false

copyright_year:
  type: str
  default: "{{ copyright_year | default('%Y' | strftime) }}"
  when: false
